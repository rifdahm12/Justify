<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savior World</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"/>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/catalog.css" />
  </head>

  <body>
        <header>
            <nav class="navbar">
                <div class="nav-container">
                    <div class="logo">
                        <img src="../image/Logo-Putih-Savior-World.png" alt="Savior World Logo White">
                    </div>

                    <!-- MENU MOBILE -->
                    <div class="hamburger" onclick="toggleMenu()">
                        <img id="burger" src="../image/icon-burger.svg" alt="Open Menu">
                    </div>

                    <!-- MENU DESKTOP -->
                    <div class="menu-desktop">
                        <a href="home.html">Home</a>
                        <a href="catalog.html">Catalog</a>
                        <a href="mixmatch.html">Mix & Match</a>
                    </div>
                </div>
            </nav>

            <!-- OVERLAY MENU MOBILE -->
            <div class="backdrop" id="backdrop" onclick="toggleMenu()"></div> <!-- Biar background gelap saat buka overlay -->
            <div class="overlay" id="overlay">
                <div class="close" onclick="toggleMenu()">
                    <img src="../image/icon-close.svg" alt="Close Menu">
                </div>

                <div class="menu-overlay">
                    <a href="home.html">Home</a>
                    <a href="catalog.html">Catalog</a>
                    <a href="mixmatch.html">Mix & Match</a>
                </div>
            </div>
        </header>

    <main>
      <section class="title">
        <b>OUR<br>CATALOG</b>
      </section>

      <!-- FILTER -->
      <section class="filter">
        <div class="dropdown">
          <select name="kategori">
            <option value="celana">Celana</option>
            <option value="tshirt">T-shirt</option>
            <option value="longsleeve">LongSleeve</option>
          </select>
        </div>

        <div class="size">
          <p>Size</p>
          <div class="size-list">
            <span>S</span>
            <span>M</span>
            <span>L</span>
            <span>XL</span>
            <span>XXL</span>
          </div>
        </div>
      </section>

      <!-- PRODUCT GRID -->
      <section class="products">
        <div class="card">
          <img src="../image/4.jpeg" />
          <h3>Nama Produk</h3>
          <div class="info">
            <span>Jenis</span>
            <span>Harga</span>
          </div>
        </div>

        <div class="card">
          <img src="../image/3.jpeg" />
          <h3>Nama Produk</h3>
          <div class="info">
            <span>Jenis</span>
            <span>Harga</span>
          </div>
        </div>

        <div class="card">
          <img src="../image/2.jpeg" />
          <h3>Nama Produk</h3>
          <div class="info">
            <span>Jenis</span>
            <span>Harga</span>
          </div>
        </div>

        <div class="card">
          <img src="../image/1.jpeg" />
          <h3>Nama Produk</h3>
            <div class="info">
            <span class="jenis">Jenis</span>
            <span class="harga">Harga</span>
          </div>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>
