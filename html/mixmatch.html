<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savior World</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"/>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/mixmatch.css">
</head>

<body>
        <header>
            <nav class="navbar">
                <div class="nav-container">
                    <div class="logo">
                        <img src="../image/Logo-Putih-Savior-World.png" alt="Savior World Logo White">
                    </div>
        
                    <!-- MENU MOBILE -->
                    <div class="hamburger" onclick="toggleMenu()">
                        <img id="burger" src="../image/icon/icon-burger.svg" alt="Open Menu">
                    </div>
        
                    <!-- MENU DESKTOP -->
                    <div class="menu-desktop">
                        <a href="home.html">Home</a>
                        <a href="catalog.html">Catalog</a>
                        <a href="mixmatch.html">Mix & Match</a>
                    </div>
                </div>
            </nav>
        
            <!-- OVERLAY MENU MOBILE -->
            <div class="backdrop" id="backdrop" onclick="toggleMenu()"></div> <!-- Biar background gelap saat buka overlay -->
            <div class="overlay" id="overlay">
                <div class="close" onclick="toggleMenu()">
                    <img src="../image/icon/icon-close.svg" alt="Close Menu">
                </div>
        
                <div class="menu-overlay">
                    <a href="home.html">Home</a>
                    <a href="catalog.html">Catalog</a>
                    <a href="mixmatch.html">Mix & Match</a>
                </div>
            </div>
        </header>

    <main>
        <div class="mixmatch-container">
        <div class="guide-card">
            <h3>✨ Cara Pakai Mix & Match</h3>
            <p>Ikuti langkah mudah ini untuk melihat gaya barumu:</p>
            <ul>
                <li>Klik satu gambar di bagian <b>Atasan</b>.</li>
                <li>Klik satu gambar di bagian <b>Bawahan</b>.</li>
                <li>Klik tombol <b>Mix</b> untuk menggabungkan!</li>
            </ul>
        </div>

        <div id="result-display" class="result-area" style="display: none; text-align: center; margin-bottom: 30px;">
            <h3 style="font-style: italic;">Your Style Concept:</h3>
            <div id="combined-preview" class="preview-box" style="display: flex; justify-content: center; gap: 10px;"></div>
            <hr style="margin-top: 20px; border: 0.5px solid #eee;">
        </div>

        <section class="selection-section">
            <h4>ATASAN</h4>
            <div class="items-grid">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
                <img src="../image/foto/img_mixmatch_atasan2.jpg" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            </div>
        </section>

        <section class="selection-section">
            <h4>Bawahan</h4>
            <div class="items-grid">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
                <img src="../image/foto/img_mixmatch_bawahan.jpg" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            </div>
        </section>

        <div class="action-area">
            <button class="btn-mix" onclick="gabungkanStyle()">Mix</button>
        </div>
    </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
