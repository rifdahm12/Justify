<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savior World</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"/>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/mixmatch.css">
</head>

<body>
    <header>
        <div class="TopNavbar">
            <a href="home.html">Home</a>
            <a href="catalog.html">Catalog</a>
            <a href="mixmatch.html" class="active">Mix & Match</a>
        </div>
    </header>
    <main class="mixmatch-container">
    <div class="guide-card">
        <h3>✨ Cara Pakai Mix & Match</h3>
        <p>Ikuti langkah mudah ini untuk melihat gaya barumu:</p>
        <ul>
            <li>Klik satu gambar di bagian <b>Atasan</b>.</li>
            <li>Klik satu gambar di bagian <b>Bawahan</b>.</li>
            <li>Klik tombol <b>Mix</b> untuk menggabungkan!</li>
        </ul>
    </div>

    <div id="result-display" class="result-area" style="display: none; text-align: center; margin-bottom: 30px;">
        <h3 style="font-style: italic;">Your Style Concept:</h3>
        <div id="combined-preview" class="preview-box" style="display: flex; justify-content: center; gap: 10px;"></div>
        <hr style="margin-top: 20px; border: 0.5px solid #eee;">
    </div>

    <section class="selection-section">
        <h4>ATASAN</h4>
        <div class="items-grid">
            <img src="../image/baju1.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            <img src="../image/baju2.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            <img src="../image/baju3.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            <img src="../image/baju3.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            <img src="../image/baju3.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
            <img src="../image/baju3.png" class="item-choice atasan" onclick="pilihItem(this, 'atasan')">
        </div>
    </section>

    <section class="selection-section">
        <h4>Bawahan</h4>
        <div class="items-grid">
            <img src="../image/celana1.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            <img src="../image/celana2.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            <img src="../image/celana2.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            <img src="../image/celana2.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            <img src="../image/celana2.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
            <img src="../image/celana2.png" class="item-choice bawahan" onclick="pilihItem(this, 'bawahan')">
        </div>
    </section>

    <div class="action-area">
        <button class="btn-mix" onclick="gabungkanStyle()">Mix</button>
    </div>

    </main>

<script src="../script.js"></script>

</body>

</html>
